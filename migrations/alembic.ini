# A generic, single database configuration.

[alembic]
# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic,flask_migrate

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
# INFO に上げている理由:
# Vercel cold start 時の auto-migration（api/index.py）の挙動を本番ログで
# 観測するため。WARN だと flask_migrate.upgrade() が出す "Running upgrade ..."
# 等の進捗ログと、api.index logger が出す "Auto-migration completed ..."
# が握りつぶされ、migration が成功したのか失敗したのか痕跡が残らなかった。
# SQLAlchemy のクエリログは [logger_sqlalchemy] で WARN に固定しているので
# ここを INFO に上げてもクエリ流出は起きない。
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[logger_flask_migrate]
level = INFO
handlers =
qualname = flask_migrate

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
