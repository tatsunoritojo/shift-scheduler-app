# A generic, single database configuration.

[alembic]
# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic,flask_migrate

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
# Reason for INFO level:
# To observe Vercel cold-start auto-migration (api/index.py) behavior in production logs.
# At WARN, progress messages from flask_migrate.upgrade() ("Running upgrade ...")
# and api.index logger ("Auto-migration completed ...") were swallowed,
# leaving no trace of whether migration succeeded or failed.
# SQLAlchemy query logs are fixed at WARN under [logger_sqlalchemy], so
# raising this to INFO does not leak queries.
# (Comments kept ASCII to avoid UnicodeDecodeError on Windows cp932 locale
#  when running flask db ... commands; alembic reads this file with encoding="locale".)
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[logger_flask_migrate]
level = INFO
handlers =
qualname = flask_migrate

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
