<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事業主 - シフリー</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/owner.css">
    <link rel="manifest" href="/static/manifest.json">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>シフリー</h1>
            <div class="user-info">
                <span id="user-name"></span>
                <span class="role-badge">事業主</span>
                <button class="logout-btn" onclick="location.href='/auth/logout'"><i data-lucide="log-out" style="width:14px;height:14px;"></i> ログアウト</button>
            </div>
        </header>
        <main class="main-content">
            <h2 class="mb-16">承認管理</h2>
            <div class="guide-box">
                <div class="guide-box-title">承認フローについて</div>
                <p>管理者が作成したシフトスケジュールの承認・差戻しを行います。シフト内容（日付・時間・スタッフ配置）を確認し、問題がなければ承認してください。差戻す場合はコメントで理由を記入してください。</p>
            </div>

            <!-- Pending list -->
            <div id="pending-list" class="loading">
                <div class="loading-spinner"></div>
                <p>読み込み中...</p>
            </div>

            <!-- Schedule detail view -->
            <div id="schedule-detail" style="display:none;">
                <div class="flex-between mb-16">
                    <h3 id="detail-title"></h3>
                    <button class="btn btn-outline" onclick="showPendingList()"><i data-lucide="arrow-left" style="width:15px;height:15px;"></i> 戻る</button>
                </div>

                <div class="card mb-16">
                    <h3>スケジュール概要</h3>
                    <div id="detail-summary"></div>
                </div>

                <div class="card mb-16">
                    <h3>シフト一覧</h3>
                    <div id="detail-entries"></div>
                </div>

                <div class="card mb-16">
                    <h3>勤務時間集計</h3>
                    <div id="detail-hours"></div>
                </div>

                <div class="card mb-16">
                    <h3>承認履歴</h3>
                    <div id="detail-history"></div>
                </div>

                <div class="card">
                    <h3>承認/差戻し</h3>
                    <p class="help-text mb-16">上記のシフト内容を確認のうえ、承認または差戻しを行ってください。承認するとシフトが確定可能になります。</p>
                    <div class="form-group">
                        <label>コメント</label>
                        <textarea id="approval-comment" class="form-control" placeholder="例: 問題ありません / ○日のスタッフ配置を見直してください"></textarea>
                        <div class="field-hint">差戻しの場合はコメント必須です。承認時は任意です。</div>
                    </div>
                    <div class="flex gap-8">
                        <button class="btn btn-success" onclick="approveSchedule()"><i data-lucide="check" style="width:15px;height:15px;"></i> 承認</button>
                        <button class="btn btn-danger" onclick="rejectSchedule()"><i data-lucide="x" style="width:15px;height:15px;"></i> 差戻し</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script type="module" src="/static/js/owner-app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }
        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
