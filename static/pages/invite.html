<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招待 - シフリー</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="manifest" href="/static/manifest.json">
    <style>
        .invite-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .invite-card {
            background: white;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            text-align: center;
        }
        .invite-card h1 {
            color: var(--color-neutral-800);
            font-size: 1.5em;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .invite-card .description {
            color: var(--color-neutral-500);
            margin-bottom: 32px;
            font-size: 0.95em;
            line-height: 1.7;
        }
        .invite-card .org-name {
            font-size: 1.2em;
            font-weight: 600;
            color: var(--color-primary-600, #3b82f6);
            margin-bottom: 8px;
        }
        .invite-card .role-label {
            display: inline-block;
            background: var(--color-neutral-100, #f3f4f6);
            color: var(--color-neutral-600);
            padding: 4px 12px;
            border-radius: var(--radius-lg);
            font-size: 0.85em;
            margin-bottom: 24px;
        }
        .google-login-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border: 1.5px solid var(--color-neutral-200);
            border-radius: var(--radius-lg);
            padding: 14px 32px;
            font-size: 1em;
            font-weight: 500;
            color: var(--color-neutral-700);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .google-login-btn:hover {
            border-color: var(--color-neutral-300);
            box-shadow: var(--shadow-md);
        }
        .google-login-btn svg {
            width: 20px;
            height: 20px;
        }
        .invite-error {
            color: var(--color-error, #ef4444);
            margin-bottom: 24px;
        }
        .invite-loading {
            color: var(--color-neutral-400);
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="invite-container">
        <div class="invite-card">
            <h1>シフリーへの招待</h1>

            <div id="invite-loading" class="invite-loading">
                <p>読み込み中...</p>
            </div>

            <div id="invite-content" style="display:none;">
                <p class="org-name" id="org-name"></p>
                <span class="role-label" id="role-label"></span>
                <p class="description">Googleアカウントでログインして組織に参加しましょう。</p>
                <a id="login-btn" class="google-login-btn" href="#">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Googleでログイン
                </a>
            </div>

            <div id="invite-error" style="display:none;">
                <p class="invite-error" id="error-message"></p>
                <a href="/" class="google-login-btn">トップページへ</a>
            </div>
        </div>
    </div>
    <script src="/static/js/invite.js"></script>
</body>
</html>
