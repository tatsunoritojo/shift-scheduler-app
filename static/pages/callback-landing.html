<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参加完了 - シフリー</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="manifest" href="/static/manifest.json">
    <style>
        .callback-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .callback-card {
            background: white;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            text-align: center;
        }
        .callback-card h1 {
            color: var(--color-neutral-800);
            font-size: 1.3em;
            margin-top: 16px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .callback-card .redirect-text {
            color: var(--color-neutral-400);
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="callback-card fade-in">
            <div class="success-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
            </div>
            <h1 id="callback-title">ログインしました</h1>
            <p class="redirect-text"><span class="spinner-inline"></span><span id="callback-message">ページに移動しています...</span></p>
        </div>
    </div>
    <script src="/static/js/callback-landing.js"></script>
</body>
</html>
