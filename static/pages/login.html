<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - シフリー</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="manifest" href="/static/manifest.json">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            padding: 48px 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .login-card h1 {
            color: var(--color-neutral-800);
            font-size: 1.6em;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .login-card .subtitle {
            color: var(--color-neutral-500);
            margin-bottom: 36px;
            font-size: 0.95em;
        }
        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: white;
            border: 1.5px solid var(--color-neutral-200);
            border-radius: var(--radius-lg);
            padding: 14px 32px;
            font-size: 1em;
            font-weight: 500;
            color: var(--color-neutral-800);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .google-btn:hover {
            border-color: var(--color-neutral-300);
            box-shadow: var(--shadow-md);
        }
        .google-btn svg {
            width: 22px;
            height: 22px;
        }
        .legacy-link {
            margin-top: 28px;
            font-size: 0.82em;
        }
        .legacy-link a {
            color: var(--color-neutral-400);
            text-decoration: none;
            transition: color 0.2s;
        }
        .legacy-link a:hover {
            color: var(--color-primary-500);
        }
        .error-message {
            display: none;
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            border-radius: var(--radius-lg);
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 0.9em;
            line-height: 1.5;
        }
        .error-message.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>シフリー</h1>
            <p class="subtitle">Googleカレンダー連携シフト管理</p>
            <div id="error-message" class="error-message"></div>
            <a href="/auth/google/login" class="google-btn">
                <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Googleでログイン
            </a>
            <div class="legacy-link">
                <a href="/app">従来のシフト計算アプリを使用</a>
            </div>
        </div>
    </div>
    <script src="/static/js/init.js"></script>
    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var error = params.get('error');
        var messages = {
            'no_invitation': 'この組織に招待されていません。管理者から招待を受けてからログインしてください。',
            'invalid_invitation': '招待リンクが無効または期限切れです。管理者に再招待を依頼してください。',
            'inactive': 'アカウントが無効化されています。管理者にお問い合わせください。'
        };
        if (error && messages[error]) {
            var el = document.getElementById('error-message');
            el.textContent = messages[error];
            el.classList.add('visible');
        }
    })();
    </script>
</body>
</html>
