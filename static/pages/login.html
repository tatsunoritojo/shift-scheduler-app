<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - シフリー</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
    <style>
        body {
            background: linear-gradient(135deg, var(--color-primary-50) 0%, #fff 50%, var(--color-primary-50) 100%);
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .login-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
        }
        .login-card h1 {
            color: var(--color-neutral-800);
            font-size: 1.6em;
            margin: 0 0 8px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .login-card .subtitle {
            color: var(--color-neutral-500);
            margin: 0 0 32px;
            font-size: 0.95em;
        }
        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: white;
            border: 1.5px solid var(--color-neutral-200);
            border-radius: var(--radius-lg);
            padding: 14px 32px;
            font-size: 1em;
            font-weight: 500;
            color: var(--color-neutral-800);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            width: 100%;
            justify-content: center;
            box-sizing: border-box;
        }
        .google-btn:hover {
            border-color: var(--color-neutral-300);
            box-shadow: var(--shadow-md);
        }
        .google-btn svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }
        .login-note {
            margin-top: 24px;
            font-size: 0.82em;
            color: var(--color-neutral-400);
            line-height: 1.6;
        }
        .login-divider {
            margin: 28px 0 24px;
            border: none;
            border-top: 1px solid var(--color-neutral-100);
        }
        .login-features {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            text-align: center;
            margin-bottom: 32px;
        }
        .login-feature {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .login-feature-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .login-feature-icon.blue { background: var(--color-primary-50); }
        .login-feature-icon.green { background: var(--color-success-50); }
        .login-feature-icon.amber { background: var(--color-warning-50); }
        .login-feature-text {
            font-size: 0.78em;
            color: var(--color-neutral-500);
            line-height: 1.4;
        }
        .login-lp-link {
            margin-top: 20px;
            font-size: 0.85em;
        }
        .login-lp-link a {
            color: var(--color-primary-500);
            text-decoration: none;
            transition: color 0.2s;
        }
        .login-lp-link a:hover {
            color: var(--color-primary-700);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <img src="/static/icons/icon-192.png" alt="シフリー" class="login-logo">
            <h1>シフリー</h1>
            <p class="subtitle">Googleカレンダー連携シフト管理</p>

            <div class="login-features">
                <div class="login-feature">
                    <div class="login-feature-icon blue">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary-500)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    </div>
                    <span class="login-feature-text">カレンダー<br>自動連携</span>
                </div>
                <div class="login-feature">
                    <div class="login-feature-icon green">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-success-500)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    </div>
                    <span class="login-feature-text">チーム<br>シフト管理</span>
                </div>
                <div class="login-feature">
                    <div class="login-feature-icon amber">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-warning-500)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <span class="login-feature-text">承認<br>ワークフロー</span>
                </div>
            </div>

            <a href="/auth/google/login" class="google-btn">
                <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Googleでログイン
            </a>

            <p class="login-note">
                初めての方もGoogleアカウントですぐに始められます。<br>
                ログイン後、組織を作成してチームを招待できます。
            </p>

            <hr class="login-divider">

            <div class="login-lp-link">
                <a href="/lp">シフリーについて詳しく見る &rarr;</a>
            </div>

            <div class="login-legal" style="margin-top: 16px; font-size: 0.78em; color: var(--color-neutral-400);">
                <a href="/privacy" style="color: var(--color-neutral-400); text-decoration: none;">プライバシーポリシー</a>
                <span style="margin: 0 6px;">|</span>
                <a href="/terms" style="color: var(--color-neutral-400); text-decoration: none;">利用規約</a>
            </div>
        </div>
    </div>
    <script src="/static/js/init.js"></script>
</body>
</html>
