<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>外部ブラウザで開く - シフリー</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--color-neutral-50, #f8fafc);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            padding: 32px 24px 28px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .app-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0 auto 20px;
        }
        h1 {
            font-size: 1.25rem;
            color: #1e293b;
            margin: 0 0 12px;
            letter-spacing: -0.01em;
        }
        .explain {
            font-size: 0.92rem;
            color: #475569;
            line-height: 1.6;
            margin: 0 0 24px;
        }
        .explain strong {
            color: #1e293b;
        }
        .open-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background: #3b82f6;
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            padding: 16px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, transform 0.05s;
            box-sizing: border-box;
        }
        .open-btn:active {
            background: #2563eb;
            transform: scale(0.99);
        }
        .copy-btn {
            display: block;
            width: 100%;
            background: transparent;
            color: #3b82f6;
            font-weight: 500;
            font-size: 0.92rem;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            cursor: pointer;
            margin-top: 12px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .copy-btn:active {
            background: #f1f5f9;
        }
        .hint {
            font-size: 0.82rem;
            color: #94a3b8;
            line-height: 1.6;
            margin: 20px 0 0;
        }
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 12px 20px;
            border-radius: 999px;
            font-size: 0.88rem;
            font-weight: 500;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.16);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .toast.show {
            opacity: 1;
        }
        .url-box {
            margin-top: 16px;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 8px;
            font-size: 0.78rem;
            color: #475569;
            word-break: break-all;
            display: none;
            text-align: left;
        }
        .url-box.show {
            display: block;
        }
        .fallback-banner {
            display: none;
            margin-top: 16px;
            padding: 12px 14px;
            background: #fef3c7;
            border: 1px solid #fcd34d;
            border-radius: 10px;
            color: #92400e;
            font-size: 0.85rem;
            line-height: 1.55;
            text-align: left;
        }
        .fallback-banner.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="app-icon">シ</div>
        <h1>外部ブラウザで続行してください</h1>
        <p class="explain">
            セキュリティのため、<strong>アプリ内ブラウザからは Google ログインできません</strong>。<br>
            下のボタンから Safari / Chrome を開いてログインしてください。
        </p>
        <a id="open-btn" class="open-btn" href="#" rel="noopener">
            <span id="open-label">ブラウザで開く</span>
        </a>
        <button id="copy-btn" class="copy-btn" type="button">URLをコピー</button>
        <div id="fallback-banner" class="fallback-banner">
            <strong>このアプリはボタンからの起動をブロックしているようです。</strong><br>
            下の「URLをコピー」を押して、<br>Safari / Chrome に貼り付けて開いてください。
        </div>
        <div id="url-box" class="url-box"></div>
        <p class="hint">
            ボタンで開けない場合は、右上の「⋯」や「︙」メニューから<br>
            「Safariで開く」「他のブラウザで開く」を選んでください。
        </p>
    </div>
    <div id="toast" class="toast">URLをコピーしました</div>
    <script src="/static/js/open-in-browser.js"></script>
</body>
</html>
