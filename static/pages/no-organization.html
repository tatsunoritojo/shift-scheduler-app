<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>組織未参加 - シフリー</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="manifest" href="/static/manifest.json">
    <style>
        .no-org-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .no-org-card {
            background: white;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            text-align: center;
        }
        .no-org-card h1 {
            color: var(--color-neutral-800);
            font-size: 1.5em;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .no-org-card .description {
            color: var(--color-neutral-500);
            margin-bottom: 32px;
            font-size: 0.95em;
            line-height: 1.7;
        }
        .no-org-card .steps {
            text-align: left;
            background: var(--color-neutral-50);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            margin-bottom: 32px;
        }
        .no-org-card .steps li {
            color: var(--color-neutral-600);
            font-size: 0.9em;
            margin-bottom: 8px;
            line-height: 1.6;
        }
        .no-org-card .steps li:last-child {
            margin-bottom: 0;
        }
        .logout-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 1.5px solid var(--color-neutral-200);
            border-radius: var(--radius-lg);
            padding: 12px 28px;
            font-size: 0.95em;
            font-weight: 500;
            color: var(--color-neutral-600);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .logout-btn:hover {
            border-color: var(--color-neutral-300);
            box-shadow: var(--shadow-md);
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 28px 0;
            color: var(--color-neutral-400);
            font-size: 0.85em;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--color-neutral-200);
        }
        .create-section {
            text-align: left;
            background: var(--color-primary-50, #eff6ff);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            margin-bottom: 24px;
        }
        .create-section h2 {
            font-size: 0.95em;
            font-weight: 600;
            color: var(--color-neutral-700);
            margin: 0 0 8px;
        }
        .create-section p {
            font-size: 0.85em;
            color: var(--color-neutral-500);
            margin: 0 0 16px;
            line-height: 1.6;
        }
        .create-form {
            display: flex;
            gap: 8px;
        }
        .create-form input {
            flex: 1;
            padding: 10px 14px;
            border: 1.5px solid var(--color-neutral-200);
            border-radius: var(--radius-md);
            font-size: 0.9em;
            outline: none;
            transition: border-color 0.2s;
        }
        .create-form input:focus {
            border-color: var(--color-primary-400, #60a5fa);
        }
        .create-btn {
            padding: 10px 20px;
            background: var(--color-primary-600, #2563eb);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .create-btn:hover {
            background: var(--color-primary-700, #1d4ed8);
        }
        .create-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .create-error {
            color: var(--color-error-600, #dc2626);
            font-size: 0.82em;
            margin-top: 8px;
            display: none;
        }
        .user-email {
            color: var(--color-neutral-400);
            font-size: 0.82em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="no-org-container">
        <div class="no-org-card">
            <h1>組織に参加していません</h1>
            <p class="description">
                シフリーを利用するには、組織の管理者から招待リンクを受け取る必要があります。
            </p>
            <div class="create-section">
                <h2>新しい組織を作成</h2>
                <p>管理者としてチームのシフト管理を始められます。</p>
                <div class="create-form">
                    <input type="text" id="org-name" placeholder="組織名（例：カフェ○○）" maxlength="255">
                    <button class="create-btn" id="create-org-btn">作成</button>
                </div>
                <div class="create-error" id="create-error"></div>
            </div>

            <div class="divider">または</div>

            <ol class="steps">
                <li>組織の管理者に招待を依頼してください</li>
                <li>受け取った招待リンクを開いてください</li>
                <li>Googleアカウントでログインすると、組織に参加できます</li>
            </ol>
            <a href="/auth/logout" class="logout-btn">ログアウト</a>
            <div class="user-email" id="user-email"></div>
        </div>
    </div>
    <script src="/static/js/no-org.js"></script>
    <script src="/static/js/init.js"></script>
</body>
</html>
