<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>はじめに - シフリー</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32.png">
    <style>
        body {
            background: linear-gradient(135deg, var(--color-primary-50) 0%, #fff 50%, var(--color-primary-50) 100%);
            min-height: 100vh;
            margin: 0;
        }
        .no-org-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .no-org-card {
            background: white;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            padding: 48px 40px;
            max-width: 460px;
            width: 100%;
            text-align: center;
        }

        /* --- Welcome state --- */
        .welcome-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--color-primary-50);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .welcome-icon svg {
            width: 28px;
            height: 28px;
            color: var(--color-primary-500);
        }
        .no-org-card h1 {
            color: var(--color-neutral-800);
            font-size: 1.4em;
            margin: 0 0 8px;
            font-weight: 600;
        }
        .no-org-card .description {
            color: var(--color-neutral-500);
            margin: 0 0 32px;
            font-size: 0.92em;
            line-height: 1.7;
        }

        /* --- Create form --- */
        .create-section {
            text-align: left;
            background: var(--color-neutral-50);
            border: 1px solid var(--color-neutral-100);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
        }
        .create-section h2 {
            font-size: 0.95em;
            font-weight: 600;
            color: var(--color-neutral-700);
            margin: 0 0 4px;
        }
        .create-section .hint {
            font-size: 0.82em;
            color: var(--color-neutral-400);
            margin: 0 0 16px;
        }
        .create-form {
            display: flex;
            gap: 8px;
        }
        .create-form input {
            flex: 1;
            padding: 12px 14px;
            border: 1.5px solid var(--color-neutral-200);
            border-radius: var(--radius-md);
            font-size: 0.9em;
            outline: none;
            transition: border-color 0.2s;
            background: white;
        }
        .create-form input:focus {
            border-color: var(--color-primary-400, #60a5fa);
        }
        .create-btn {
            padding: 12px 24px;
            background: var(--color-primary-600, #2563eb);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .create-btn:hover {
            background: var(--color-primary-700, #1d4ed8);
        }
        .create-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .create-error {
            color: var(--color-danger-600, #dc2626);
            font-size: 0.82em;
            margin-top: 10px;
            display: none;
        }

        /* --- Divider --- */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--color-neutral-400);
            font-size: 0.82em;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--color-neutral-200);
        }

        /* --- Invite steps --- */
        .steps {
            text-align: left;
            background: var(--color-neutral-50);
            border: 1px solid var(--color-neutral-100);
            border-radius: var(--radius-lg);
            padding: 20px 24px 20px 40px;
            margin-bottom: 28px;
        }
        .steps li {
            color: var(--color-neutral-600);
            font-size: 0.88em;
            margin-bottom: 6px;
            line-height: 1.6;
        }
        .steps li:last-child {
            margin-bottom: 0;
        }

        /* --- Logout & email --- */
        .logout-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 1.5px solid var(--color-neutral-200);
            border-radius: var(--radius-lg);
            padding: 10px 24px;
            font-size: 0.88em;
            font-weight: 500;
            color: var(--color-neutral-600);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .logout-btn:hover {
            border-color: var(--color-neutral-300);
            box-shadow: var(--shadow-md);
        }
        .user-email {
            color: var(--color-neutral-400);
            font-size: 0.8em;
            margin-top: 16px;
        }

        /* --- Setting up (transition) state --- */
        .setup-state {
            display: none;
            padding: 24px 0;
        }
        .setup-state.active {
            display: block;
        }
        .setup-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--color-neutral-100);
            border-top-color: var(--color-primary-500);
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .setup-state h2 {
            font-size: 1.15em;
            font-weight: 600;
            color: var(--color-neutral-800);
            margin: 0 0 8px;
        }
        .setup-state .setup-org-name {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--color-primary-600);
            margin: 0 0 20px;
        }
        .setup-steps {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
            max-width: 280px;
            margin: 0 auto;
        }
        .setup-step {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.88em;
            color: var(--color-neutral-400);
            transition: color 0.3s;
        }
        .setup-step.done {
            color: var(--color-success-600);
        }
        .setup-step .step-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--color-neutral-200);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .setup-step.done .step-icon {
            border-color: var(--color-success-500);
            background: var(--color-success-500);
        }
        .setup-step.done .step-icon svg {
            display: block;
        }
        .setup-step .step-icon svg {
            display: none;
            width: 12px;
            height: 12px;
            color: white;
        }

        /* --- Fade animation --- */
        .fade-out {
            animation: fadeOut 0.3s ease forwards;
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-8px); }
        }
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="no-org-container">
        <div class="no-org-card">

            <!-- Welcome state (default) -->
            <div id="welcome-state">
                <div class="welcome-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                </div>
                <h1>シフリーへようこそ</h1>
                <p class="description">
                    組織を作成するか、管理者からの招待で参加できます。
                </p>

                <div id="create-form-section" class="create-section">
                    <h2>組織を新規作成</h2>
                    <p class="hint">店舗名やチーム名を入力してください</p>
                    <div class="create-form">
                        <input type="text" id="org-name" placeholder="例：カフェ○○" maxlength="255">
                        <button class="create-btn" id="create-org-btn">作成</button>
                    </div>
                    <div class="create-error" id="create-error"></div>
                </div>

                <div class="divider">招待で参加する場合</div>

                <ol class="steps">
                    <li>組織の管理者に招待を依頼してください</li>
                    <li>招待リンクを開いてGoogleでログイン</li>
                </ol>

                <a href="/auth/logout" class="logout-btn">ログアウト</a>
                <div class="user-email" id="user-email"></div>
            </div>

            <!-- Setting up state (after create) -->
            <div id="setup-state" class="setup-state">
                <div class="setup-spinner"></div>
                <h2>組織をセットアップ中</h2>
                <p class="setup-org-name" id="setup-org-name"></p>
                <div class="setup-steps">
                    <div class="setup-step" id="step-org">
                        <span class="step-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
                        <span>組織を作成</span>
                    </div>
                    <div class="setup-step" id="step-hours">
                        <span class="step-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
                        <span>営業時間を設定</span>
                    </div>
                    <div class="setup-step" id="step-ready">
                        <span class="step-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
                        <span>管理画面の準備完了</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="/static/js/no-org.js"></script>
    <script src="/static/js/init.js"></script>
</body>
</html>
